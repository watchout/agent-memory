# wasurezu CI
#
# Runs the full SQLite + JSON-store test suite. PostgreSQL tests are
# excluded from CI because spinning up pgvector in CI is slow; the
# SQLite path is the OSS default. Developers can run the PG suite
# locally with `docker compose up` (see docker-compose.yml).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run core test suite
        run: npx tsx src/test.ts

      - name: Run spec-enforcement tests
        run: npx tsx tests/spec-enforcement/anti-regression-am027.ts

      - name: Run SQLite store tests
        run: HOME=$(mktemp -d) npx tsx src/test-sqlite.ts

      - name: Run Kusabi partition lane tests (CELL-4MCP-KUSABI-001)
        run: HOME=$(mktemp -d) npx tsx src/test-kusabi-partitions.ts

      - name: Run boot recovery tests
        run: HOME=$(mktemp -d) npx tsx src/test-boot-recovery.ts

      - name: Run post-tool-hook tests
        run: HOME=$(mktemp -d) npx tsx src/test-post-tool-hook.ts

      - name: Run Gate 0 tests
        run: |
          HOME=$(mktemp -d) npx tsx tests/gate0/no-secret-recovery.ts
          HOME=$(mktemp -d) npx tsx tests/gate0/migration-idempotency.ts
          HOME=$(mktemp -d) npx tsx tests/gate0/search-memory-regression.ts
