blockers:
  - id: BLOCK-EXACT-L1-EVIDENCE
    surfaces: [README.md, package.json, src/index.ts, src/constants.ts]
    reason: >-
      Present L1 capability claims exist, but a complete clean-install, core
      tool, SQLite/default, and package-payload evidence packet bound to this
      exact target head was not found. The exact head includes later storage
      changes, so ancestor evidence is not promoted by inference.
    recovery: Run a separately authorized exact-head L1 evidence Cell and independent audit; do not change public copy in this Cell.
  - id: BLOCK-L2-AUTOSTART-CLAIM
    surfaces: [src/index.ts, docs/operations/HOST_ADAPTERS.md]
    reason: >-
      The recover_context MCP description says it is called automatically by a
      SessionStart hook and the host matrix assigns startup levels, but the L2
      recovery score packet required by the ladder is absent.
    recovery: Provide accepted exact-head L2 evidence or use a separate owner-authorized claim-surface rework Cell.
  - id: BLOCK-PUBLISH-AUTHORITY
    surfaces: [README.md, package.json]
    reason: >-
      README explicitly says npm publish and public readiness are unauthorized;
      no registry artifact, publish dry run, complete Phase 0 gate packet, or
      owner exact-head publish decision is present.
    recovery: Complete the separately controlled publish gates and owner decision; this report grants none.

