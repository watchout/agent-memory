discovery_method:
  deterministic: true
  rules:
    - Inspect README present-tense product, install, support, storage, recovery, compatibility, and release statements.
    - Inspect package.json description, keywords, bins, package files, name, and version.
    - Enumerate every server.tool registration and its description in src/index.ts plus imported description constants.
    - Enumerate every tracked docs/v2 Markdown file at target_head and treat explicit future/draft/non-shipped requirements as planning claims.
    - Resolve every README link into docs/operations and inspect the linked file.
    - Check for a registry artifact or separate npm/public-copy file; when absent, record absence rather than infer published copy.
  claim_unit: >-
    A normalized present-tense capability, release, support, compatibility, or
    future-guardrail assertion. Repeated wording with the same level, class,
    evidence, and boundary is one claim; every MCP tool and every docs/v2 file
    remains individually enumerated.
  omission_policy: Any discovered unclassified surface makes inventory_complete false and blocks the audit.

