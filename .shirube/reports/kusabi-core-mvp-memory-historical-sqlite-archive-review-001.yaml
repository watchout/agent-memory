implementation_summary:
  - Adds the repo-local Shirube Cell for historical SQLite archive review.
  - Limits the review target to the seven remaining non-binding SQLite files visible after stale alias cleanup.
  - Separates zero-row archive candidates from row-bearing historical sources.
  - Keeps hotel-lead and secretary retained-agent historical DBs as review-only targets, not host restart, migration, deletion, or binding changes.
  - Treats memory.db as a high-risk default/global historical DB review candidate.
  - Treats emergency-handoff-20260605.db as historical handoff evidence to preserve.
  - Requires path, size, timestamp, table-count, row-count, and classification metadata only.
  - Requires separate owner/operator authorization before any local archive, deletion, migration, purge, or retained-agent handling.

