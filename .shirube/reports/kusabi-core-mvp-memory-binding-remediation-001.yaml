implementation_summary:
  - Adds an operator runbook for memory binding remediation after the read-only persistence audit.
  - Defines binding decision states for shared PostgreSQL, fail-closed URL-only intent, explicit SQLite local exceptions, missing project, ignored URL, entrypoint drift, inactive, and blocked bindings.
  - Defines safe host restart timing and practical memory smoke evidence.
  - Keeps actual local config edits, host restarts, and smoke writes outside the repository diff.
  - Does not modify runtime behavior, DB content, package metadata, workflows, deployment, or local configs.

claim_boundary:
  allowed_claims:
    - A memory binding remediation runbook exists.
    - Active bindings require explicit owner/operator classification before being called remediated.
    - SQLite local-only bindings need explicit exception evidence.
    - Host restart and smoke evidence are operator actions outside this PR.
  not_claimed:
    - Local MCP configs are remediated by this PR.
    - Active agents are currently bound correctly.
    - Hosts were restarted by this PR.
    - Smoke writes/readbacks were executed by this PR.
    - Backend parity.
    - Common DB completion.
    - Common registry integration.
    - Cross-agent memory federation.
    - UAMP conformance.
    - Enterprise compliance.
    - Release readiness or publish authorization.

