implementation_summary:
  - Applies the owner/operator binding policy correction from issue #228.
  - Preserves shared PostgreSQL as the path for retained development, handoff, coordinator, implementation, audit, QA, check, CTO, Shirube, and org-build reachable agents.
  - Directs deleted, retired, replaced, duplicate, or stale alias agents to inactive/archive cleanup rather than migration or SQLite exception.
  - Keeps the approved SQLite exception scope limited to FX lane agents tsumiage-claude and tsumiage-codex.
  - Updates low/no-count PostgreSQL bindings to smoke_required or inactive/duplicate decisions.

