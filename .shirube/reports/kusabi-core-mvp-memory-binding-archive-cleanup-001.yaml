implementation_summary:
  - Adds the repo-local Shirube Cell for inactive/archive cleanup of stale SQLite binding residue.
  - Limits the cleanup target to lead-ama, lead-sus, and lead-tuk.
  - Keeps stale aliases inactive/archive-only, not migration targets and not SQLite exceptions.
  - Requires lead-ama retired/replaced_by codex-aun evidence preservation.
  - Keeps the approved SQLite exception scope limited to FX lane agents tsumiage-claude and tsumiage-codex.
  - Requires read-only audit refresh and issue evidence before and after any separately authorized local cleanup.

claim_boundary:
  allowed_claims:
    - The memory binding inactive/archive cleanup Cell is defined in repo-local Shirube control artifacts.
    - lead-ama, lead-sus, and lead-tuk stale SQLite binding residue have a bounded cleanup contract.
    - Actual local cleanup remains separate owner/operator-authorized issue execution after this Cell is merged.
  not_claimed:
    - Local MCP configs are remediated by this PR.
    - Historical SQLite residue was archived or cleaned by this PR.
    - Stored memory content was migrated, exported, revealed, deleted, purged, or rewritten.
    - Retired or stale aliases were reactivated.
    - lead-ama, lead-sus, or lead-tuk are approved SQLite exceptions.
    - Backend parity.
    - Common DB completion.
    - Common registry integration.
    - Cross-agent memory federation.
    - UAMP conformance.
    - Enterprise compliance.
    - Release readiness or publish authorization.

validation_expected:
  - git diff --name-only origin/main...HEAD
  - git diff --check origin/main...HEAD
  - git diff --check
  - changed Shirube YAML parse
  - audit item JSON parse
  - independent audit record
  - owner exact-head decision before merge

boundary_statement: >-
  This PR changes repo-local Shirube governance artifacts only. It changes no
  runtime behavior, src product code, package metadata, package or lockfiles,
  MCP namespace, environment variable names, DB paths, DB schema or migrations,
  workflows, deployment files, local MCP/Claude/Codex configs, stored memory
  content, branch protection, rulesets, schema files, fixtures, runners, UAMP
  conformance, common DB completion, backend parity, federation, compliance,
  release, publish, DLP, zero-leakage, legal/regulatory claims, host restarts,
  smoke writes, local config remediation, historical SQLite migration, or local
  archive cleanup.
