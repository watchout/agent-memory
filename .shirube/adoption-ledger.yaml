status_entry:
  shirube_status: PARTIAL_SHIRUBE_PILOT
  current_mode: gate-pack-bridge / owner-observed
  control_source: https://github.com/watchout/agent-memory/issues/203
  owner: watchout
  current_pr: pending_l3_ci_hard_block_gate_pr
  current_head: pending_after_latest_commit
  last_exact_head_decision:
    status: pending
    reason: L3 CI hard-block gate PR exact head must be confirmed by owner before merge.
  next_step: >-
    Merge the L3 CI hard-block gate PR after owner exact-head
    confirmation, then re-run PR #205 under the visible Shirube machine gate
    before owner approval.

classification:
  allowed:
    - PARTIAL_SHIRUBE_PILOT
    - rapid-lite-ci-hard-block
    - gate-pack-bridge
    - owner-observed
  forbidden:
    - FULL_SHIRUBE_CONTROLLED
    - V3_COMPLETE
    - FULLY_ENFORCED
    - REQUIRED_CHECK_ACTIVE
    - BRANCH_PROTECTION_CONTROLLED

minimum_pr_controls:
  - control_source
  - scope
  - non_scope
  - allowed_paths
  - forbidden_paths
  - protected_surface_declaration
  - exact_head_sha
  - validation_evidence
  - owner_decision
  - post_merge_evidence

protected_surfaces:
  must_declare:
    - auth
    - database_migration
    - workflow
    - deployment
    - secrets
    - required_check_activation
    - branch_protection
    - ruleset
  lightweight_allowed: false

operating_rules:
  - LLM judgment alone must not be treated as merge-ready.
  - Owner approval without exact head is invalid.
  - Adoption PRs and runtime PRs must remain separate.
  - BLOCKED or would_block findings require owner exception or rework before merge.
  - Repositories without .shirube overlay must use Gate Pack Bridge and must not claim Shirube adoption.
