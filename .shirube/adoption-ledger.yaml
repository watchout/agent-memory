  lightweight_allowed: false

operating_rules:
  - LLM judgment alone must not be treated as merge-ready.
  - Owner approval without exact head is invalid.
  - Adoption PRs and runtime PRs must remain separate.
  - BLOCKED or would_block findings fail the required rapid-lite-gate check.
  - CELL audit record is required for every Shirube-controlled PR before merge.
  - CELL audit items must be reconciled as PASS, FAIL, or WAIVED.
  - FAIL audit items block merge.
  - WAIVED audit items require durable waiver_ref.
  - Repositories without .shirube overlay must use Gate Pack Bridge and must not claim Shirube adoption.
