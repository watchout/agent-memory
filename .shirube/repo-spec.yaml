  - agent-memory
status: active
mode: rapid-lite-required-check
shirube_adoption:
  status: SHIRUBE_V3_L4_REQUIRED_CHECK_CONTROLLED
  mode: gate-pack-bridge / required-check-enforced
  current_control_level: L4_REQUIRED_CHECK_AND_BRANCH_PROTECTION
  next_control_level: L5_FULL_OVERLAY_AND_MULTI_REPO_CONTROL
