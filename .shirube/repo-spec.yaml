purpose: >-
  Define the repository-specific premise, governance boundary, memory boundary,
  and Core MVP implementation control model for Kusabi, a lightweight MCP
  memory/recovery server that preserves existing wasurezu / agent-memory
  compatibility while V2 guardrails remain future-facing.

non_goals:
  - Do not change runtime memory behavior through this repo-spec.
  - Do not change persistence behavior through this repo-spec.
  - Do not rename package, CLI, MCP server, MCP tool namespace, database path, or environment variables.
  - Do not change required checks, branch protection, or rulesets outside an owner-approved Shirube governance path.
  - Do not add production deployment behavior.
  - Do not claim full Shirube rollout, enterprise enforcement, UAMP conformance, backend parity, or V2 migration completion.
  - Do not treat stored external text as trusted instruction.
  - Do not describe this repository as V3 complete before full overlay and multi-repo control are approved.

design_principles:
  - Core MVP stays a lightweight MCP memory/recovery server.
  - Existing wasurezu / agent-memory compatibility is preserved until a separate owner-approved migration changes it.
  - Machine-readable evidence is primary; prose summaries are supporting context.
  - Rapid/Lite collapses artifacts, not control.
  - Required-check control is active for merge gating; full overlay adoption remains separate.
  - Broad V2 strategy docs are guardrails, not implementation blockers unless a Core MVP change directly touches that boundary.
  - Source text, transcripts, tool output, and imported context remain data-only unless a control-plane path explicitly promotes them.

development_flow: docs/v2/KUSABI_V2_IMPLEMENTATION_READINESS_PLAN.md
required_gates:
  - repo_spec
  - adoption_intake
  - rapid_lite_control_handoff
  - diff_scope
  - validation_evidence
  - owner_exact_head_decision
  - post_merge_evidence

operating_model:
  readiness:
    purpose: Confirm Core MVP scope before implementation.
    gates:
      - repo_spec
      - adoption_intake
      - rapid_lite_control_handoff
    ci_hard_block: true
    required_check_active: true
    branch_protection_active: true
    stop_condition: >-
      Stop if the work attempts UAMP, conformance, compliance, federation,
      tenant identity, suite integration, package/MCP/env/DB migration, workflow
      required-check activation, or branch protection before Core MVP is stable.
  dev_loop:
    purpose: Keep each Core MVP implementation PR bounded by a Rapid/Lite cell.
    gates:
      - rapid_lite_control_handoff
      - diff_scope
      - validation_evidence
    ci_hard_block: true
    required_check_active: true
    stop_condition: >-
      Stop if changed files leave the handoff allowed_paths or match
      forbidden_paths.
  change_flow:
    purpose: Keep protected surfaces out of Core MVP Rapid/Lite work.
    gates:
      - owner_exact_head_decision
      - post_merge_evidence
    ci_hard_block: true
    required_check_active: true
    branch_protection_active: true
    stop_condition: >-
      Stop if protected, external, destructive, workflow, branch-protection,
      deployment, or live suite behavior is requested.
  phase_control:
    purpose: Track Core MVP movement from adoption through post-merge evidence.
    state_ref: .shirube/lifecycle-state.yaml
    transition_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
    ci_hard_block: true
    required_check_active: true
    branch_protection_active: true

gate_catalog:
  repo_spec:
    purpose: Validate Repository Premise Spec minimum structure.
    script: /Users/yuji/Developer/ai-dev-framework/scripts/shirube/check-repo-spec.mjs
    responsible_role: repo_owner
    required_evidence:
      - .shirube/repo-spec.yaml
  adoption_intake:
    purpose: Classify this repository as retrofit_accelerate and identify gap-fill work.
    script: /Users/yuji/Developer/ai-dev-framework/scripts/shirube/check-adoption.mjs
    responsible_role: implementation
    required_evidence:
      - .shirube/adoption-intake.yaml
      - .shirube/existing-state-scan.yaml
  rapid_lite_control_handoff:
    purpose: Bind each Core MVP PR to a cell, allowed paths, forbidden paths, validation, and stop conditions.
    script: /Users/yuji/Developer/ai-dev-framework/scripts/shirube/check-gate-contract.mjs
    responsible_role: implementation
    required_evidence:
      - .shirube/control-handoffs/*.yaml
  lifecycle:
    purpose: Track readiness, implementation, PR, merge, and post-merge phases.
    script: /Users/yuji/Developer/ai-dev-framework/scripts/shirube/check-lifecycle.mjs
    responsible_role: implementation
    required_evidence:
      - .shirube/lifecycle-state.yaml

required_evidence:
  repo_spec:
    - .shirube/repo-spec.yaml
    - .shirube/evidence/rps-confirmation.yaml
  planning:
    - watchout/agent-memory#203
    - docs/v2/KUSABI_V2_IMPLEMENTATION_READINESS_PLAN.md
  implementation_pr:
    - repo_local_issue
    - control_handoff
    - scope_and_non_scope
    - allowed_paths_and_forbidden_paths
    - protected_surface_declaration
    - changed_files
    - validation_commands
    - validation_results
    - exact_pr_head_sha
    - owner_decision
  merge:
    - exact head evidence
    - machine gate output
    - owner exact-head decision
  post_merge:
    - merge commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step

risk_tier_policy:
  R0:
    gates:
      - mechanical gates
    merge_authority: owner merge only; auto-merge candidate does not mean active auto-merge.
  R1:
    gates:
      - mechanical gates
      - semantic audit when requested
    merge_authority: owner merge.
  R2:
    gates:
      - mechanical gates
      - semantic audit
      - implementation audit when required
    merge_authority: owner merge.
  R3:
    gates:
      - mechanical gates
      - semantic audit
      - human authority
      - staged rollout when behavior changes
    merge_authority: protected human authority.

waiver_policy:
  allowed: true
  requirements:
    - waiver must target a specific Cell and check
    - waiver must include reason, compensating controls, approver, expiry, and follow-up issue
    - waiver cannot authorize forbidden Core MVP scope without a separate owner-approved work order

post_merge_policy:
  required: true
  no_done_without_post_merge_evidence: true

remediation_contract:
  applies_to:
    - WARN
    - BLOCK
  fields:
    - verdict
    - current_phase
    - blocked_reason
    - missing_prerequisites
    - required_next_actions
    - responsible_role
    - allowed_next_phases
    - forbidden_next_phases
    - required_evidence
    - observed_evidence
    - reference_docs

