    doc_ref: /Users/yuji/Developer/ai-dev-framework/docs/standards/shirube-v3-rapid-lite-gate-contract-matrix.md
  lifecycle:
    on_fail: Return to the earliest blocked phase and provide the missing structured evidence.
    doc_ref: /Users/yuji/Developer/ai-dev-framework/docs/standards/shirube-lifecycle-flow-guard.md
