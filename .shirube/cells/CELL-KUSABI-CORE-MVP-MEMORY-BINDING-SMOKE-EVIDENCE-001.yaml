schema_version: shirube-cell/rapid-lite/v1
cell_id: KUSABI-CORE-MVP-MEMORY-BINDING-SMOKE-EVIDENCE-001
title: Core MVP memory binding smoke evidence
status: active
risk_tier: R3
parent_ssot: https://github.com/watchout/agent-memory/issues/228
goal: >-
  Define the Shirube-controlled operator execution contract for memory binding
  smoke evidence after the owner/operator binding policy correction, without
  changing repository runtime behavior.
covers:
  - memory binding smoke evidence contract
  - retained non-FX SQLite binding migration evidence
  - retired/replaced/stale alias inactive/archive evidence
  - low/no-count PostgreSQL smoke evidence
  - safe one-host-at-a-time restart sequencing
  - no claim upgrade boundary
allowed_paths:
  - .shirube/cells/CELL-KUSABI-CORE-MVP-MEMORY-BINDING-SMOKE-EVIDENCE-001.yaml
  - .shirube/control-handoffs/CH-KUSABI-CORE-MVP-MEMORY-BINDING-SMOKE-EVIDENCE-001.yaml
  - .shirube/audit-item-sets/kusabi-core-mvp-memory-binding-smoke-evidence-001.json
  - .shirube/reports/kusabi-core-mvp-memory-binding-smoke-evidence-001.yaml
forbidden_paths:
  - src/**
  - package.json
  - package-lock.json
  - pnpm-lock.yaml
  - .github/workflows/**
  - docker-compose.yml
  - deploy/**
  - .env
  - .env.*
  - private-config/**
  - secrets/**
  - docs/v2/**
  - tests/uamp/**
  - "**/.mcp.json"
  - "**/.claude/settings.json"
  - "**/.codex/**"
  - "**/*.db"
  - "**/*.sqlite"
  - "**/*.sqlite3"
  - "**/branch-protection/**"
  - "**/ruleset/**"
required_tests:
  - git diff --name-only origin/main...HEAD
  - git diff --check origin/main...HEAD
  - git diff --check
  - changed Shirube YAML parse
  - audit item JSON parse
post_merge_tests:
  - verify changed files remain within allowed paths
  - verify no runtime/package/workflow/deploy/local-config/DB-content paths changed
  - verify next step remains operator issue evidence
stop_conditions:
  - A repository diff would include local MCP configs, Claude configs, Codex configs, env files, secrets, DB files, or stored memory content.
  - A step would restart multiple MCP hosts at once.
  - A step would mutate stored memory outside the bounded smoke sequence.
  - A step would export, reveal, delete, purge, rewrite, or migrate stored memory content.
  - A step would change runtime behavior, src, package metadata, workflows, deployment, branch protection, or rulesets.
  - A step would rename DB paths, env vars, package identity, or MCP namespace.
  - A step would create UAMP schemas, fixtures, runners, or conformance claims.
  - A step would claim backend parity, common DB completion, federation, compliance, release, publish, DLP, or zero-leakage.
notes:
  - This Cell records an operator execution contract only.
  - Local config edits, host restarts, and smoke writes are operator actions outside repository diffs.
  - Current approved SQLite exception remains FX lane only: tsumiage-claude and tsumiage-codex.
  - Active retained development, coordinator, implementation, audit, QA, check, CTO, Shirube, and org-build reachable agents use shared PostgreSQL.
