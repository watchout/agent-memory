    - any ALPHA-01+ or protected/runtime operation is required
    - any validation, independent audit, or exact-head binding fails
    - owner exact-head decision is missing before merge

acceptance_criteria:
  - Exactly one common Host Adapter Contract defines adapter_id/version, host/version, ordinary launch command, native start surface, config location, verified identity resolution, trust/install prerequisites, structured input/output, provenance/evidence, redaction, bounded output caps, and visible degraded fallback.
  - Host-specific variation is isolated behind symmetric adapters; no env-switch or host adapter owns lifecycle, queue, restart policy, gate, merge, deploy, or activation authority.
  - Placed is not treated as delivered: config/hook presence alone is not first-context delivery evidence.
  - Declared is not treated as verified: an agent_id label alone is not identity evidence.
  - The continuity-alpha host gate is exactly Codex, Claude Code, and Gemini CLI; Cursor is later and community hosts are contract-only.
  - The P0 matrix is exactly 10 agents: kusabi, spec, arc, codex-cto, codex-audit, devauditor, qa, check, org-build-dev, and dev-001.
  - Gemini uses dedicated canary identity kusabi-gemini with memory_project agent-memory, workspace /Users/yuji/Developer/agent-memory, runtime gemini-cli, alpha-canary-only, and normal_work_queue false.
  - T0=fresh process start, T1=context injection complete, T2=orientation complete, T3=first meaningful safe continuation action begins, and T4=first useful continuation result.
  - Thresholds are T1-T0 <=10s, T3-T0 <=30s, and T4-T0 <=60s.
  - The frozen continuity-alpha gate requires recovery score >=28/30, blind operator >=4.5/5, RI0, and user restatement count 0.
  - Any retained 24/26/27-point maturity/debug threshold is explicitly non-alpha and cannot satisfy this frozen alpha gate.
  - S15 negative evaluator fixture is a prerequisite for any admissible alpha score; S15 failure invalidates downstream scoring, and stored-value echo/squelch is an automatic failure.
  - Current claim limits remain explicit: no disconnect detection, automatic restart, running-session injection, perfect-recovery guarantee, or zero-leak guarantee.
  - The PR changes only the four allowed paths and remains docs/control-only with no ALPHA-01+ or protected effect.
  - Merge remains blocked until an independent exact-head audit returns PASS or PASS_WITH_WARN and owner separately approves that exact head.

design_flow_conformance:
  G1:
    status: PASS
    sources:
      - https://github.com/watchout/agent-memory/issues/180#issuecomment-5053368043
      - https://github.com/watchout/agent-memory/issues/180#issuecomment-5053530003
      - https://github.com/watchout/agent-memory/issues/180#issuecomment-5054279853
      - https://github.com/watchout/agent-memory/issues/262
      - https://github.com/watchout/agent-memory/issues/263
    new_inventions: []
  G2:
    status: PASS
    deterministic_skeleton: thresholds, identity, score admissibility, S15, stop and authority decisions are script-controlled
    learning_loop: later score evidence may refine specimens; no learner or runner is implemented here
  G3:
    status: PASS
    boundary: symmetric thin host adapters with structured provenance-bearing input/output and explicit ownership exclusions
  G4:
    status: PASS
    predicates: exact four paths, exact host set, 10 agents, 10/30/60 seconds, 28/30, 4.5/5, RI0, S15
  G5:
    status: PASS
    failures:
      - silent adapter failure -> visible degraded result and ordinary-launch fallback
      - timeout -> exact clock failure
      - partial document drift -> cross-document failure
      - correlated evaluator error -> S15 invalidates scoring
      - stored-value echo/squelch -> automatic failure
      - placed_not_delivered and declared_not_verified -> direct evidence required
      - redaction/output overflow -> safety failure
  G6:
    status: PASS
    boundary: runtime/config/secret/DB/queue/workflow/deploy/merge surfaces are forbidden; maker-checker separation is mandatory
  G7:
    status: PASS
    reach_evidence: durable Issue URL, repo-local handoff path, AUN reply, and final exact-head audit route

