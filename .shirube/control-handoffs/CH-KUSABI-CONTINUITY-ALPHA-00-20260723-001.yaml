    - the four control-source/owner refs are unavailable, superseded, or contradictory
    - the three docs disagree on host gate, P0 agents, canary identity, clocks, score, RI0, S15, fallback, or claim limits
    - a 26/30 or 27/30 rule can still authorize this frozen continuity-alpha gate
    - ordinary host launch could be blocked or fail silently when recovery is unavailable, untrusted, disabled, timed out, or invalid
    - stored-value echo/squelch could receive a passing score
