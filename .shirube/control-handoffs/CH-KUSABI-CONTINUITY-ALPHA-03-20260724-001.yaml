    - npm test
    - git diff --check
    - changed-path subset check against cell.allowed_paths
  required_evidence:
    - exact base, head, tree, ordered parents, branch, and clean isolated worktree
    - exact changed-path list and allowed-path subset result
    - command-by-command validation output
    - fail-safe, identity, redaction, cap, timeout, preservation, idempotence, trust-boundary, and zero-write fixture results
    - Draft PR URL and exact remote-head readback
    - independent exact-head evidence_audit_gate PASS or PASS_WITH_WARN
    - zero live workspace activation, TUI write, AUN queue mutation, restart, and running-session injection

