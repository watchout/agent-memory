    - Gemini CLI 0.38.2 native hook schema or trust behavior contradicts the frozen design
    - ordinary gemini launch cannot remain usable on hook failure
    - agent_id, project, and workspace identity cannot be verified without ambiguity
    - any focused test, build, full test, secret-safety, timeout, or path-subset check fails
    - any live target config, hook trust, TUI, AUN queue, restart, or running-session effect occurs
    - durable implementation or audit evidence cannot be read back

acceptance_criteria:
  - The ordinary launch command remains exactly gemini and the native config surface is .gemini/settings.json.
  - SessionStart input accepts startup, resume, and clear and rejects malformed or unsupported inputs safely.
  - Stdout is exactly one strict JSON object with continue true and bounded hookSpecificOutput.additionalContext when recovery succeeds.
  - Identity binds explicit agent_id, project, and workspace and verifies hook cwd inside that workspace; cwd-only inference is forbidden.
  - Recovery output is redacted and records numeric byte/token caps, redaction count, truncation count, and omitted-section count.
  - Internal deadline is at most 7000ms and the Gemini hook timeout is 9000ms, both below the T1 10s alpha limit.
  - Recovery and evidence failures leave ordinary startup usable and visibly degraded.
  - Installer check/dry-run/apply is atomic and idempotent, preserves unrelated settings/hooks, records a rollback backup, and never auto-trusts hooks.
  - A changed project hook requires operator review; config presence remains placed_not_delivered until first-context evidence is separately observed.
  - Hook-side evidence keeps T0-T4 and first-context confirmation null/false; only a later canary may claim delivered timing evidence.
  - ALPHA-03 performs no live hook placement, activation, canary, rollout, restart, TUI write, or AUN queue mutation.

