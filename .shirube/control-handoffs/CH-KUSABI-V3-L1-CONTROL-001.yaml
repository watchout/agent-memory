schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-KUSABI-V3-L1-CONTROL-001
parent_ssot: https://github.com/watchout/agent-memory/issues/203
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: shirube-v3-rapid-lite@c9367c91eeae9df8cfc23ffd8ddbadfdb0df005f
framework_lock_ref: null
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: null
owner_confirmation_ref: .shirube/evidence/rps-confirmation.yaml
premise_confirmation_ref: null
spec_review_state: ready_for_implementation

repo: watchout/agent-memory
repo_local_issue: https://github.com/watchout/agent-memory/issues/203
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - Rapid/Lite report-only control handoff evidence for Core MVP work.
    - Local gate execution records for adoption, lifecycle, and gate-contract checks.
    - PR evidence contract for allowed paths, forbidden paths, validation, exact head, and owner decision.
  shirube_does_not_own:
    - Runtime behavior by this scaffold PR.
    - Required check activation.
    - Workflow enforcement.
    - Branch protection or ruleset mutation.
    - Package, MCP namespace, environment variable, or DB path migration.
    - UAMP conformance, backend parity, compliance, federation, or suite integration claims.

acceptance_criteria:
  - V3 repo-spec check has no BLOCK findings.
  - Adoption intake classifies this repo as retrofit_accelerate or better.
  - Lifecycle can reach EXECUTION_READY for L1 metadata control.
  - Changed files stay inside .shirube/** for this scaffold cell.
  - No runtime/package/MCP/env/DB/workflow/deployment behavior changes.

validation:
  required_commands:
    - git diff --name-only main...HEAD
    - git diff --check main...HEAD
    - git diff --check
    - node /Users/yuji/Developer/ai-dev-framework/scripts/shirube/check-repo-spec.mjs --format json
    - node /Users/yuji/Developer/ai-dev-framework/scripts/shirube/check-adoption.mjs --adoption-plan .shirube/adoption-intake.yaml --existing-state .shirube/existing-state-scan.yaml --repo-spec .shirube/repo-spec.yaml --handoff .shirube/control-handoffs/CH-KUSABI-V3-L1-CONTROL-001.yaml --format json
    - node /Users/yuji/Developer/ai-dev-framework/scripts/shirube/check-lifecycle.mjs --state .shirube/lifecycle-state.yaml --adoption-report .shirube/reports/adoption.json --repo-spec .shirube/repo-spec.yaml --handoff .shirube/control-handoffs/CH-KUSABI-V3-L1-CONTROL-001.yaml --format json
  test_expectations:
    - L1 scaffold remains .shirube/** only.
    - Gate-contract exact head and owner decision are supplied through PR evidence before merge, not self-referential committed SHA.
  required_evidence:
    - .shirube/repo-spec.yaml
    - .shirube/adoption-intake.yaml
    - .shirube/existing-state-scan.yaml
    - .shirube/lifecycle-state.yaml
    - .shirube/control-handoffs/CH-KUSABI-V3-L1-CONTROL-001.yaml
    - changed_files
    - validation_results

cell:
  CELL-ID: CELL-KUSABI-V3-L1-CONTROL-001
  cell_type: scaffold
  risk_class: R2
  goal: >-
    Add Shirube V3 Rapid/Lite report-only control metadata so Core MVP
    implementation can proceed under explicit handoff and evidence controls.
  non_scope:
    - Runtime code changes.
    - Package or lockfile changes.
    - Workflow or required check activation.
    - Branch protection or ruleset changes.
    - Deployment or production changes.
    - MCP namespace, env var, DB path, or schema migration.
    - UAMP conformance, backend parity, compliance, federation, tenant identity, or suite integration.
  allowed_paths:
    - .shirube/**
  forbidden_paths:
    - src/**
    - lib/**
    - bin/**
    - dist/**
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - .github/workflows/**
    - docker-compose.yml
    - deploy/**
    - .env
    - .env.*
    - private-config/**
    - secrets/**
    - "**/branch-protection/**"
    - "**/ruleset/**"
  stop_conditions:
    - Changed file outside .shirube/**.
    - Forbidden path touched.
    - Runtime/package/MCP/env/DB/workflow/deployment behavior is requested.
    - Required check activation or branch protection mutation is requested.
    - The work attempts to claim UAMP conformance, backend parity, compliance, federation, or suite integration.
  authorized_next_cells:
    - CELL-KUSABI-CORE-MVP-REDACTION-001

implementation_boundary:
  summary: >-
    This cell only introduces V3 Rapid/Lite report-only metadata and a bounded
    control path for the first Core MVP implementation PR.
  expected_pr_count: 1
  forbidden_operations:
    - merge without owner exact-head decision
    - approve own PR as final authority
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, or external repository mutation

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
