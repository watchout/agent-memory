schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-KUSABI-CORE-MVP-MEMORY-PERSISTENCE-AUDIT-001
parent_ssot: https://github.com/watchout/agent-memory/issues/225
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: shirube-v3-rapid-lite@d19119c71562d577f5b5f4393068686f55ff4a87
repo_spec_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: .shirube/evidence/rps-confirmation.yaml
spec_review_state: ready_for_implementation
escalation_route: >-
  Stop and require explicit owner/domain review if this PR would move beyond
  read-only audit tooling and ops evidence into local config remediation,
  runtime behavior changes, DB content mutation, package changes, workflow
  enforcement, deployment, branch protection, backend parity, common DB
  completion, federation, UAMP conformance, release, or publish behavior.

repo: watchout/agent-memory
repo_local_issue: https://github.com/watchout/agent-memory/issues/225
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - Rapid/Lite evidence contract for the memory persistence audit refresh PR.
    - Diff-scope, validation, exact-head, independent audit, and owner-decision evidence checks.
  shirube_does_not_own:
    - Local MCP config remediation.
    - Runtime behavior, package identity, MCP namespace, env var names, DB paths, DB schemas, stored memory content, workflows, deployment, branch protection, rulesets, backend parity, common DB completion, federation, UAMP conformance, release, or publish decisions.

acceptance_criteria:
  - Audit script is read-only and does not write local configs or stored memory content.
  - Audit script redacts URL-like and secret-like values.
  - Audit script does not read stored memory text; it reports metadata, backend classifications, and row counts only.
  - PostgreSQL row-count probing remains opt-in through --include-postgres.
  - Backend classification reflects post-PR #186 behavior: PostgreSQL URL intent is fail-closed unless explicit local store type is selected.
  - Ops evidence clearly labels 2026-06-22 values as historical and does not imply current local configs are already remediated.
  - No runtime, src, package, lockfile, workflow, deployment, local config, DB content, env var, DB path, schema, fixture, runner, backend parity, common DB completion, UAMP conformance, release, or publish change is introduced.
  - Node 18 / 20 / 22 CI-compatible commands remain green or failures are reported with exact scope.

validation:
  required_commands:
    - git diff --name-only origin/main...HEAD
    - git diff --check origin/main...HEAD
    - git diff --check
    - node --check scripts/audit-memory-persistence.mjs
    - node scripts/audit-memory-persistence.mjs --json
    - npm test
    - npm run build
    - npx tsc --noEmit
  test_expectations:
    - script parses under Node without syntax errors
    - script emits JSON report without write operations
    - report includes summary, MCP binding, SQLite, and PostgreSQL skipped/included sections
    - script classifies URL-only PostgreSQL as postgres-url-fail-closed, not postgres-implicit-fallback-enabled
  required_evidence:
    - changed_files
    - validation_commands
    - validation_results
    - remote_CI_Node_18_20_22
    - independent_audit_record
    - exact_pr_head_sha
    - owner_decision_before_merge

audit:
  item_set_ref: .shirube/audit-item-sets/kusabi-core-mvp-memory-persistence-audit-001.json
  required_before_owner_decision: true

cell:
  CELL-ID: CELL-KUSABI-CORE-MVP-MEMORY-PERSISTENCE-AUDIT-001
  cell_type: ops_lite
  risk_class: R2
  goal: >-
    Refresh read-only memory persistence audit tooling and evidence so active
    agent binding drift can be inspected without modifying product behavior,
    local operator configs, or stored memory content.
  non_scope:
    - Runtime behavior changes.
    - Local MCP config edits.
    - Claude/Codex config edits.
    - Stored memory content mutation.
    - DB schema migration.
    - DB path migration.
    - Env var rename.
    - Package or lockfile changes.
    - MCP namespace rename.
    - Workflow changes.
    - Deployment changes.
    - Backend parity claim.
    - Common registry implementation or common DB completion claim.
    - UAMP runtime emitters or conformance claim.
    - Fixture files or fixture runner.
    - Tenant/user identity.
    - Cross-agent federation.
    - Enterprise compliance or attestation implementation.
    - Release or publish authorization.
  allowed_paths:
    - .shirube/cells/CELL-KUSABI-CORE-MVP-MEMORY-PERSISTENCE-AUDIT-001.yaml
    - .shirube/control-handoffs/CH-KUSABI-CORE-MVP-MEMORY-PERSISTENCE-AUDIT-001.yaml
    - .shirube/audit-item-sets/kusabi-core-mvp-memory-persistence-audit-001.json
    - .shirube/reports/kusabi-core-mvp-memory-persistence-audit-001.yaml
    - scripts/audit-memory-persistence.mjs
    - docs/operations/MEMORY_PERSISTENCE_AUDIT_2026-06-22.md
  forbidden_paths:
    - src/**
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - .github/workflows/**
    - docker-compose.yml
    - deploy/**
    - .env
    - .env.*
    - private-config/**
    - secrets/**
    - docs/v2/**
    - tests/uamp/**
    - "**/.mcp.json"
    - "**/.claude/settings.json"
    - "**/branch-protection/**"
    - "**/ruleset/**"
  stop_conditions:
    - Change writes local configs or memory DB content.
    - Change reads or emits stored memory text instead of counts/metadata.
    - Change modifies runtime behavior, src, package metadata, workflows, deployment, branch protection, or rulesets.
    - Change claims backend parity, common DB completion, UAMP conformance, compliance, release, or publish readiness.
    - Change spans beyond read-only audit tooling and ops documentation.

implementation_boundary:
  summary: >-
    Add read-only operational audit tooling and update historical ops evidence
    to reflect post-PR #186 fail-closed storage policy. Do not remediate local
    configs or mutate memory stores in this PR.
  expected_pr_count: 1
  forbidden_operations:
    - merge without independent audit
    - merge without owner exact-head decision
    - local MCP config mutation
    - DB content mutation
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - package metadata mutation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, or external repository mutation

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_diff_check
    - post_merge_changed_files
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
