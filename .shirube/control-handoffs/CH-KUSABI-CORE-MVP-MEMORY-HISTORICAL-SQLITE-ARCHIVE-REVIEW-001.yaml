schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-KUSABI-CORE-MVP-MEMORY-HISTORICAL-SQLITE-ARCHIVE-REVIEW-001
parent_ssot: https://github.com/watchout/agent-memory/issues/228
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: shirube-v3-rapid-lite@6917720d0ea02fe96f3b7752aa802bc135ec1b19
repo_spec_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: .shirube/evidence/rps-confirmation.yaml
spec_review_state: ready_for_implementation
escalation_route: >-
  Stop and require explicit owner/operator review if execution would move
  beyond historical SQLite archive review planning into stored memory content
  inspection, migration, deletion, purge, local DB movement, retained-agent
  runtime changes, package changes, workflow enforcement, deployment, branch
  protection, backend parity, common DB completion, UAMP conformance,
  federation, compliance, release, or publish claims.

repo: watchout/agent-memory
repo_local_issue: https://github.com/watchout/agent-memory/issues/228
owner:
  role: repo_owner
  actor: watchout
next_role: operator

rps_scope:
  shirube_owns:
    - Rapid/Lite evidence contract for the historical SQLite archive review Cell.
    - Diff-scope, validation, exact-head, independent audit, and owner-decision evidence checks for this control PR.
    - Required classification evidence fields and stop conditions before remaining SQLite residue can be called reviewed.
  shirube_does_not_own:
    - Live local MCP config editing itself.
    - Stored memory content.
    - Historical DB migration, export, reveal, rewrite, purge, deletion, or semantic inspection decisions.
    - Operator secrets, env files, local DB files, Claude/Codex local settings, external queues, LaunchAgents, or tmux state.
    - Runtime behavior, package identity, MCP namespace, env var names, DB paths, DB schemas, workflows, deployment, branch protection, rulesets, backend parity, common DB completion, federation, UAMP conformance, compliance, release, or publish decisions.

acceptance_criteria:
  - A repo-local Cell exists for KUSABI-CORE-MVP-MEMORY-HISTORICAL-SQLITE-ARCHIVE-REVIEW-001.
  - The Cell is anchored to issue #228 and follows the corrected memory binding policy.
  - The Cell identifies the seven remaining non-binding SQLite files as review targets, not active SQLite exceptions.
  - Zero-row files are classified separately from row-bearing historical files.
  - Retained-agent historical DB review candidates do not imply host restarts, migration, deletion, or runtime changes.
  - memory.db is treated as a high-risk default/global historical DB review candidate.
  - emergency-handoff-20260605.db is treated as historical handoff evidence to preserve.
  - Actual local archive, deletion, purge, migration, or retained-agent handling remains separate owner/operator-authorized issue execution after this Cell is merged.
  - Local config files, DB files, secrets, and stored memory content must not enter the repository diff.
  - Runtime, package, MCP, env, DB schema/path, workflow, deployment, branch protection, ruleset, UAMP, federation, compliance, release, and publish changes remain out of scope.

validation:
  required_commands:
    - git diff --name-only origin/main...HEAD
    - git diff --check origin/main...HEAD
    - git diff --check
    - changed Shirube YAML parse
    - audit item JSON parse
  test_expectations:
    - changed files are .shirube control artifacts only
    - no local config or DB content files are changed
    - no runtime, package, workflow, deployment, branch protection, or ruleset files are changed
    - no backend parity, common DB completion, release, publish, UAMP conformance, compliance, DLP, or zero-leakage claim is introduced
  required_evidence:
    - changed_files
    - validation_commands
    - validation_results
    - independent_audit_record
    - exact_pr_head_sha
    - owner_decision_before_merge

audit:
  item_set_ref: .shirube/audit-item-sets/kusabi-core-mvp-memory-historical-sqlite-archive-review-001.json
  required_before_owner_decision: true

cell:
  CELL-ID: CELL-KUSABI-CORE-MVP-MEMORY-HISTORICAL-SQLITE-ARCHIVE-REVIEW-001
  cell_type: ops_lite
  risk_class: R3
  goal: >-
    Establish the evidence contract for reviewing remaining non-binding
    historical SQLite files after stale alias cleanup, before any separate
    owner/operator-authorized archive action is considered.
  non_scope:
    - Runtime behavior changes.
    - Repository commits of local MCP configs, Claude/Codex local configs, env files, secrets, or DB files.
    - Stored memory content export, reveal, deletion, rewrite, migration, purge, or semantic inspection.
    - Local archive cleanup executed by this PR.
    - Retained active agent restart, migration, binding change, or host operation.
    - DB schema migration, DB path migration, env var rename, package changes, or MCP namespace rename.
    - Workflow, deployment, branch protection, or ruleset changes.
    - Backend parity, common DB completion, UAMP conformance, federation, compliance, release, publish, DLP, or zero-leakage claim.
  allowed_paths:
    - .shirube/cells/CELL-KUSABI-CORE-MVP-MEMORY-HISTORICAL-SQLITE-ARCHIVE-REVIEW-001.yaml
    - .shirube/control-handoffs/CH-KUSABI-CORE-MVP-MEMORY-HISTORICAL-SQLITE-ARCHIVE-REVIEW-001.yaml
    - .shirube/audit-item-sets/kusabi-core-mvp-memory-historical-sqlite-archive-review-001.json
    - .shirube/reports/kusabi-core-mvp-memory-historical-sqlite-archive-review-001.yaml
  forbidden_paths:
    - src/**
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - .github/workflows/**
    - docker-compose.yml
    - deploy/**
    - .env
    - .env.*
    - private-config/**
    - secrets/**
    - docs/v2/**
    - tests/uamp/**
    - "**/.mcp.json"
    - "**/.claude/settings.json"
    - "**/.codex/**"
    - "**/*.db"
    - "**/*.sqlite"
    - "**/*.sqlite3"
    - "**/branch-protection/**"
    - "**/ruleset/**"
  stop_conditions:
    - Change writes local configs or memory DB content into the repository diff.
    - Change reads or emits stored memory text instead of path, size, timestamp, table-count, row-count, and classification metadata.
    - Change modifies runtime behavior, src, package metadata, workflows, deployment, branch protection, or rulesets.
    - Change claims backend parity, common DB completion, UAMP conformance, compliance, release, publish, DLP, or zero-leakage.
    - Change treats historical SQLite residue as current SQLite exception approval.
    - Change archives, deletes, purges, migrates, moves, or rewrites local DB files without separate owner/operator authorization.
    - Change restarts or mutates retained active agent hosts.
    - Change treats this review as historical memory migration.

historical_sqlite_review_contract:
  decision_issue: https://github.com/watchout/agent-memory/issues/228
  evidence_issue: https://github.com/watchout/agent-memory/issues/228
  latest_read_only_audit:
    path: /tmp/kusabi-228-audit-for-historical-sqlite-cell.json
    generated_at: "2026-07-01T01:45:47.712Z"
    summary:
      binding_count: 26
      postgres_explicit_bindings: 26
      sqlite_file_count: 7
      sqlite_files_with_rows: 4
  review_targets:
    - file: ~/.agent-memory/emergency-handoff-20260605.db
      classification: historical_handoff_evidence_archive_candidate
      known_rows: true
      required_handling: preserve evidence; no migration, deletion, purge, or content inspection in this Cell
    - file: ~/.agent-memory/hotel-dev.db
      classification: zero_row_archive_candidate
      known_rows: false
      required_handling: archive candidate only after separate owner/operator authorization
    - file: ~/.agent-memory/hotel-lead.db
      classification: retained_agent_historical_db_review_candidate
      known_rows: true
      required_handling: review only; no retained-agent restart, migration, deletion, or binding change in this Cell
    - file: ~/.agent-memory/memory.db
      classification: high_risk_default_global_historical_db_review_candidate
      known_rows: true
      required_handling: preserve as high-risk historical source unless separately authorized; no content inspection in this Cell
    - file: ~/.agent-memory/secretary.db
      classification: retained_agent_historical_db_review_candidate
      known_rows: true
      required_handling: review only; no retained-agent restart, migration, deletion, or binding change in this Cell
    - file: ~/.agent-memory/upwork-dev.db
      classification: zero_row_archive_candidate
      known_rows: false
      required_handling: archive candidate only after separate owner/operator authorization
    - file: ~/.agent-memory/xmarketing-dev.db
      classification: zero_row_archive_candidate
      known_rows: false
      required_handling: archive candidate only after separate owner/operator authorization
  required_sequence:
    - Re-run read-only audit from current main.
    - Confirm the seven target files are not active .mcp.json bindings.
    - Record path, size, timestamp, table-count, row-count, and classification metadata only.
    - Do not select, export, reveal, summarize, migrate, delete, purge, or rewrite stored memory text.
    - If owner/operator authorizes archive after this Cell is merged, handle zero-row, retained-agent historical, global/default, and handoff-evidence files according to their classifications.
    - Re-run read-only audit after any separately authorized local action.
    - Record issue evidence with target files, action taken, skipped targets, warnings, and missing evidence.
  required_evidence_fields:
    - target_file
    - classification
    - row_presence
    - active_binding_present
    - action
    - evidence_preserved
    - stored_memory_content_read
    - repo_diff_created
    - audit_before
    - audit_after
    - missing_evidence
  current_sqlite_exception_class:
    - tsumiage-claude
    - tsumiage-codex

implementation_boundary:
  summary: >-
    Add repo-local Shirube control artifacts for historical SQLite archive
    review. Do not perform local archive, stored memory mutation, migration,
    deletion, purge, retained-agent host operations, or local config edits in
    this PR.
  expected_pr_count: 1
  forbidden_operations:
    - merge without independent audit
    - merge without owner exact-head decision
    - local MCP config mutation in repository diff
    - local archive cleanup by this PR
    - DB content mutation
    - stored memory migration, export, reveal, deletion, purge, rewrite, semantic inspection, or summarization
    - retained active agent restart or binding mutation
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - package metadata mutation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, tmux, or external repository mutation

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_diff_check
    - post_merge_changed_files
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
