acceptance_criteria:
  - The ordinary launch command remains exactly codex and the native config surface is .codex/hooks.json.
  - SessionStart input accepts startup, resume, clear, and compact and rejects malformed or unsupported inputs safely.
  - Output is schema-shaped JSON with continue true and bounded hookSpecificOutput.additionalContext when recovery succeeds.
  - The emitted content is a restart_pack with an exact pack ref, schema ref, confidence, missing_context, source refs, and data-only trust boundary in evidence.
  - Identity binds explicit agent_id, project, and workspace and verifies hook cwd inside that workspace; cwd-only inference is forbidden.
  - Recovery output is redacted and records numeric byte/token caps, redaction count, truncation count, and omitted-section count.
  - Internal deadline is at most 7000ms and the Codex hook timeout is 9s, both below the T1 10s alpha limit.
  - Unavailable, timed-out, malformed, wrong-identity, over-cap, or evidence-log failure leaves ordinary startup usable and visibly degraded.
  - Installer check/dry-run/apply is atomic and idempotent, preserves unrelated hooks, records a rollback backup, and never auto-trusts hooks.
  - Config presence remains placed_not_delivered until operator trust and first-context evidence are separately observed.
  - Hook-side source evidence keeps T0-T4 and first-context confirmation null/false; only a later canary may claim delivered timing evidence.
  - Wrapper and manual MCP paths remain non-alpha fallback evidence and are not counted as native delivery.
  - ALPHA-01 performs no live hook placement, activation, canary, rollout, restart, TUI write, or AUN queue mutation.

