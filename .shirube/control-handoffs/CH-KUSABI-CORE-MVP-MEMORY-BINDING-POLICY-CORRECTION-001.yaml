schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-KUSABI-CORE-MVP-MEMORY-BINDING-POLICY-CORRECTION-001
parent_ssot: https://github.com/watchout/agent-memory/issues/228
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: shirube-v3-rapid-lite@d19119c71562d577f5b5f4393068686f55ff4a87
repo_spec_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: .shirube/evidence/rps-confirmation.yaml
spec_review_state: ready_for_implementation
escalation_route: >-
  Stop and require explicit owner/domain review if this PR would move beyond
  docs/control policy correction into local config remediation, host restart,
  smoke writes, runtime behavior changes, DB content mutation, package changes,
  workflow enforcement, deployment, branch protection, backend parity, common
  DB completion, federation, UAMP conformance, compliance, release, or publish
  behavior.

repo: watchout/agent-memory
repo_local_issue: https://github.com/watchout/agent-memory/issues/228
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - Rapid/Lite evidence contract for the memory binding policy correction PR.
    - Diff-scope, validation, exact-head, independent audit, and owner-decision evidence checks.
  shirube_does_not_own:
    - Local MCP config remediation.
    - Host restart execution.
    - Smoke write execution.
    - Runtime behavior, package identity, MCP namespace, env var names, DB paths, DB schemas, stored memory content, workflows, deployment, branch protection, rulesets, backend parity, common DB completion, federation, UAMP conformance, compliance, release, or publish decisions.

acceptance_criteria:
  - Docs reflect the owner/operator correction that retained development, handoff, coordinator, implementation, audit, QA, check, CTO, Shirube, and org-build reachable agents use shared PostgreSQL.
  - Docs reflect that deleted, retired, replaced, duplicate, or stale alias agents are inactive/archive targets, not migration targets and not SQLite exceptions.
  - Current approved SQLite exception remains FX lane only: tsumiage-claude and tsumiage-codex.
  - Current eight non-FX SQLite bindings are classified according to the owner/operator decision in issue #228.
  - Low/no-count PostgreSQL bindings retain smoke_required or inactive/duplicate classification.
  - No runtime, src, package, lockfile, workflow, deployment, local config, DB content, env var, DB path, schema, fixture, runner, backend parity, common DB completion, UAMP conformance, compliance, release, or publish change is introduced.

validation:
  required_commands:
    - git diff --name-only origin/main...HEAD
    - git diff --check origin/main...HEAD
    - git diff --check
    - changed Shirube YAML parse
    - audit item JSON parse
  test_expectations:
    - changed files are docs/operations and .shirube artifacts only
    - correction does not authorize local config changes in the repo diff
    - correction does not claim backend parity, common DB completion, release, publish, UAMP conformance, compliance, DLP, or zero-leakage
  required_evidence:
    - changed_files
    - validation_commands
    - validation_results
    - independent_audit_record
    - exact_pr_head_sha
    - owner_decision_before_merge

audit:
  item_set_ref: .shirube/audit-item-sets/kusabi-core-mvp-memory-binding-policy-correction-001.json
  required_before_owner_decision: true

cell:
  CELL-ID: CELL-KUSABI-CORE-MVP-MEMORY-BINDING-POLICY-CORRECTION-001
  cell_type: ops_lite
  risk_class: R2
  goal: >-
    Correct docs/control binding policy so PostgreSQL, inactive/archive, and
    FX-only SQLite exception boundaries match the owner/operator decision.
  non_scope:
    - Runtime behavior changes.
    - Local MCP config edits.
    - Claude/Codex config edits.
    - Host restarts executed by the PR.
    - Smoke writes executed by the PR.
    - Stored memory content mutation.
    - DB schema migration.
    - DB path migration.
    - Env var rename.
    - Package or lockfile changes.
    - MCP namespace rename.
    - Workflow changes.
    - Deployment changes.
    - Backend parity claim.
    - Common registry implementation or common DB completion claim.
    - UAMP runtime emitters or conformance claim.
    - Fixture files or fixture runner.
    - Tenant/user identity.
    - Cross-agent federation.
    - Enterprise compliance or attestation implementation.
    - Release or publish authorization.
  allowed_paths:
    - .shirube/cells/CELL-KUSABI-CORE-MVP-MEMORY-BINDING-POLICY-CORRECTION-001.yaml
    - .shirube/control-handoffs/CH-KUSABI-CORE-MVP-MEMORY-BINDING-POLICY-CORRECTION-001.yaml
    - .shirube/audit-item-sets/kusabi-core-mvp-memory-binding-policy-correction-001.json
    - .shirube/reports/kusabi-core-mvp-memory-binding-policy-correction-001.yaml
    - docs/operations/MEMORY_BINDING_CLASSIFICATION_2026-06-30.md
    - docs/operations/MEMORY_BINDING_REMEDIATION_RUNBOOK.md
  forbidden_paths:
    - src/**
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - .github/workflows/**
    - docker-compose.yml
    - deploy/**
    - .env
    - .env.*
    - private-config/**
    - secrets/**
    - docs/v2/**
    - tests/uamp/**
    - "**/.mcp.json"
    - "**/.claude/settings.json"
    - "**/branch-protection/**"
    - "**/ruleset/**"
  stop_conditions:
    - Change writes local configs or memory DB content.
    - Change reads or emits stored memory text instead of count/classification metadata.
    - Change modifies runtime behavior, src, package metadata, workflows, deployment, branch protection, or rulesets.
    - Change claims backend parity, common DB completion, UAMP conformance, compliance, release, publish, DLP, or zero-leakage.
    - Change approves non-FX SQLite exceptions without explicit owner/operator reason.
    - Change revives retired/replaced/stale aliases through migration work.
    - Change spans beyond docs/control policy correction.

implementation_boundary:
  summary: >-
    Correct docs/control classification evidence for the current owner/operator
    memory binding policy. Do not perform remediation, host restarts, smoke
    writes, or local archive cleanup in this PR.
  expected_pr_count: 1
  forbidden_operations:
    - merge without independent audit
    - merge without owner exact-head decision
    - local MCP config mutation
    - host restart execution
    - smoke write execution
    - DB content mutation
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - package metadata mutation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, or external repository mutation

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_diff_check
    - post_merge_changed_files
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
