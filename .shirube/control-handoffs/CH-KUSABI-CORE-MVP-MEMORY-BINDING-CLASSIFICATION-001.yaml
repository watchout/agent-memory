schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-KUSABI-CORE-MVP-MEMORY-BINDING-CLASSIFICATION-001
parent_ssot: https://github.com/watchout/agent-memory/issues/229
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: watchout/ai-dev-framework@6917720d0ea02fe96f3b7752aa802bc135ec1b19
repo_spec_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: .shirube/evidence/rps-confirmation.yaml
spec_review_state: ready_for_implementation
escalation_route: >-
  Stop and require explicit owner/domain review if this PR would move beyond
  docs/control classification evidence into local config remediation, runtime
  behavior changes, DB content mutation, package changes, workflow enforcement,
  deployment, branch protection, backend parity, common DB completion,
  federation, UAMP conformance, compliance, release, or publish behavior.

repo: watchout/agent-memory
repo_local_issue: https://github.com/watchout/agent-memory/issues/229
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - Rapid/Lite evidence contract for the memory binding classification PR.
    - Diff-scope, validation, exact-head, independent audit, and owner-decision evidence checks.
  shirube_does_not_own:
    - Local MCP config remediation.
    - Host restart execution.
    - Runtime behavior, package identity, MCP namespace, env var names, DB paths, DB schemas, stored memory content, workflows, deployment, branch protection, rulesets, backend parity, common DB completion, federation, UAMP conformance, compliance, release, or publish decisions.

acceptance_criteria:
  - Classification artifact records the 2026-06-30 binding snapshot and source evidence.
  - FX lane SQLite exception is bounded and does not close unrelated SQLite bindings.
  - Shared PostgreSQL bindings are separated from smoke-needed or inactive candidates.
  - Current explicit SQLite bindings remain pending until owner/operator classification.
  - Next Cell is identified as operator smoke evidence rather than runtime repository implementation.
  - No runtime, src, package, lockfile, workflow, deployment, local config, DB content, env var, DB path, schema, fixture, runner, backend parity, common DB completion, UAMP conformance, compliance, release, or publish change is introduced.

validation:
  required_commands:
    - git diff --name-only origin/main...HEAD
    - git diff --check origin/main...HEAD
    - git diff --check
    - changed Shirube YAML parse
    - audit item JSON parse
  test_expectations:
    - changed files are docs/operations and .shirube artifacts only
    - classification does not authorize local config changes in the repo diff
    - classification does not claim backend parity, common DB completion, release, publish, UAMP conformance, compliance, DLP, or zero-leakage
  required_evidence:
    - changed_files
    - validation_commands
    - validation_results
    - independent_audit_record
    - exact_pr_head_sha
    - owner_decision_before_merge

audit:
  item_set_ref: .shirube/audit-item-sets/kusabi-core-mvp-memory-binding-classification-001.json
  required_before_owner_decision: true

cell:
  CELL-ID: CELL-KUSABI-CORE-MVP-MEMORY-BINDING-CLASSIFICATION-001
  cell_type: ops_lite
  risk_class: R2
  goal: >-
    Add the classification artifact needed to continue memory binding remediation
    through normal Shirube Cell flow instead of ad hoc exception handling.
  non_scope:
    - Runtime behavior changes.
    - Local MCP config edits.
    - Claude/Codex config edits.
    - Host restarts executed by the PR.
    - Smoke writes executed by the PR.
    - Stored memory content mutation.
    - DB schema migration.
    - DB path migration.
    - Env var rename.
    - Package or lockfile changes.
    - MCP namespace rename.
    - Workflow changes.
    - Deployment changes.
    - Backend parity claim.
    - Common registry implementation or common DB completion claim.
    - UAMP runtime emitters or conformance claim.
    - Fixture files or fixture runner.
    - Tenant/user identity.
    - Cross-agent federation.
    - Enterprise compliance or attestation implementation.
    - Release or publish authorization.
  allowed_paths:
    - .shirube/cells/CELL-KUSABI-CORE-MVP-MEMORY-BINDING-CLASSIFICATION-001.yaml
    - .shirube/control-handoffs/CH-KUSABI-CORE-MVP-MEMORY-BINDING-CLASSIFICATION-001.yaml
    - .shirube/audit-item-sets/kusabi-core-mvp-memory-binding-classification-001.json
    - .shirube/reports/kusabi-core-mvp-memory-binding-classification-001.yaml
    - docs/operations/MEMORY_BINDING_CLASSIFICATION_2026-06-30.md
    - docs/operations/MEMORY_BINDING_REMEDIATION_RUNBOOK.md
  forbidden_paths:
    - src/**
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - .github/workflows/**
    - docker-compose.yml
    - deploy/**
    - .env
    - .env.*
    - private-config/**
    - secrets/**
    - docs/v2/**
    - tests/uamp/**
    - "**/.mcp.json"
    - "**/.claude/settings.json"
    - "**/branch-protection/**"
    - "**/ruleset/**"
  stop_conditions:
    - Change writes local configs or memory DB content.
    - Change reads or emits stored memory text instead of count/classification metadata.
    - Change modifies runtime behavior, src, package metadata, workflows, deployment, branch protection, or rulesets.
    - Change claims backend parity, common DB completion, UAMP conformance, compliance, release, publish, DLP, or zero-leakage.
    - Change spans beyond docs/control classification evidence.

implementation_boundary:
  summary: >-
    Add docs/control classification evidence for the current memory binding audit
    state. Do not perform remediation, host restarts, or smoke writes in this PR.
  expected_pr_count: 1
  forbidden_operations:
    - merge without independent audit
    - merge without owner exact-head decision
    - local MCP config mutation
    - host restart execution
    - smoke write execution
    - DB content mutation
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - package metadata mutation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, or external repository mutation

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_diff_check
    - post_merge_changed_files
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
